spring.application.name=CivicConnectBackend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/CivicConnect
spring.datasource.username=postgres
spring.datasource.password=hunter2580

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
